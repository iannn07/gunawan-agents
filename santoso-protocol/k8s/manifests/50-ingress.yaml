apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gunawan
  namespace: gunawan
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - gunawan-paperclip.digital-lab.ai
        - gunawan-bridge.digital-lab.ai
      secretName: gunawan-tls
  rules:
    - host: gunawan-paperclip.digital-lab.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: paperclip
                port:
                  number: 3100
    - host: gunawan-bridge.digital-lab.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: telegram-bridge
                port:
                  number: 3200
